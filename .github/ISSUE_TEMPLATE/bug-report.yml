name: Bug Report
description: Report a bug or unexpected behavior
labels: [bug, triage]

body:
  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of WhisperSync is affected?
      options:
        - Dictation
        - Meeting recording
        - Transcription
        - Speaker identification
        - Installer
        - UI/Tray icon
        - Other
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: Describe the issue...
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
      placeholder: Describe what you expected...

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. ...
        2. ...
        3. ...

  - type: textarea
    id: log-output
    attributes:
      label: Log output
      description: Paste any relevant log output here.
      render: shell

  - type: input
    id: gpu
    attributes:
      label: GPU
      description: Your GPU model (e.g., NVIDIA RTX 3060).
      placeholder: NVIDIA RTX 3060

  - type: input
    id: model
    attributes:
      label: Model in use
      description: Which Whisper model were you using? (e.g., large-v3, medium, small)
      placeholder: large-v3
