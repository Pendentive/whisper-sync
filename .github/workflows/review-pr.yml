name: PR Review

on:
  pull_request:
    types: [opened, synchronize]
  pull_request_review:
    types: [submitted]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  triage:
    runs-on: ubuntu-latest
    outputs:
      complexity: ${{ steps.classify.outputs.complexity }}
      changed_files: ${{ steps.classify.outputs.changed_files }}
      changed_lines: ${{ steps.classify.outputs.changed_lines }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Classify PR complexity
        id: classify
        uses: actions/github-script@v7
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100
            });

            const changedFiles = files.length;
            const changedLines = files.reduce((sum, f) => sum + f.additions + f.deletions, 0);
            let complexity;
            if (changedLines > 200 || changedFiles > 5) {
              complexity = 'high';
            } else if (changedLines >= 50 || changedFiles >= 3) {
              complexity = 'medium';
            } else {
              complexity = 'low';
            }

            core.setOutput('complexity', complexity);
            core.setOutput('changed_files', changedFiles);
            core.setOutput('changed_lines', changedLines);

            // Remove any existing complexity labels
            const labels = context.payload.pull_request.labels.map(l => l.name);
            for (const label of labels) {
              if (label.startsWith('complexity:')) {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.payload.pull_request.number,
                  name: label
                });
              }
            }

            // Add the new complexity label
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              labels: [`complexity:${complexity}`]
            });

            console.log(`PR classified as ${complexity}: ${changedFiles} files, ${changedLines} lines`);

  docs-check:
    runs-on: ubuntu-latest
    needs: triage
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Check docs freshness
        uses: actions/github-script@v7
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100
            });

            const warnings = [];

            const addedPy = files
              .filter(f => f.filename.endsWith('.py') && f.status === 'added')
              .map(f => f.filename);

            const removedPy = files
              .filter(f => f.filename.endsWith('.py') && f.status === 'removed')
              .map(f => f.filename);

            const configChanged = files.some(
              f => (f.filename.endsWith('config.py') || f.filename.endsWith('paths.py'))
                && f.status !== 'removed'
            );

            if (addedPy.length > 0) {
              const names = addedPy.map(f => `\`${f}\``).join(', ');
              warnings.push(`New modules added: ${names} — consider updating docs/architecture section in CLAUDE.md`);
            }

            if (removedPy.length > 0) {
              const names = removedPy.map(f => `\`${f}\``).join(', ');
              warnings.push(`Modules removed: ${names} — consider updating docs/architecture section in CLAUDE.md`);
            }

            if (configChanged) {
              warnings.push('Config or paths changed — verify CLAUDE.md config section is current');
            }

            if (warnings.length > 0) {
              const body = [
                '## Docs Freshness Check',
                '',
                ...warnings.map(w => `- ${w}`),
                '',
                'These are reminders, not blockers.'
              ].join('\n');

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: body
              });
            }

  review:
    runs-on: ubuntu-latest
    needs: triage
    steps:
      - name: Post review comment
        uses: actions/github-script@v7
        with:
          script: |
            const complexity = '${{ needs.triage.outputs.complexity }}';

            // Re-fetch files to avoid template literal injection from multiline outputs
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100
            });

            const changedFiles = files.length;
            const changedLines = files.reduce((sum, f) => sum + f.additions + f.deletions, 0);
            const fileList = files.map(f => `- \`${f.filename}\` (+${f.additions} -${f.deletions})`).join('\n');

            let body;

            if (complexity === 'high') {
              body = [
                '## Human Review Requested',
                '',
                `This PR has **${changedLines} changed lines** across **${changedFiles} files**, classified as \`complexity:high\`.`,
                '',
                '### Changed files',
                fileList,
                '',
                'cc @pendentive'
              ].join('\n');
            } else {
              body = [
                `## Automated Review — \`complexity:${complexity}\``,
                '',
                `**${changedLines} lines** changed across **${changedFiles} files**.`,
                '',
                '### Changed files',
                fileList
              ].join('\n');
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: body
            });

  auto-merge:
    runs-on: ubuntu-latest
    needs: triage
    permissions:
      contents: write
      pull-requests: write
      issues: write
    if: github.event_name == 'pull_request_review' && github.event.review.user.login == 'copilot-pull-request-reviewer[bot]'
    steps:
      - name: Auto-merge if Copilot approved
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const { data: prData } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });
            if (prData.state !== 'open' || prData.merged) return;

            // Dedup
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: prNumber
            });
            if (comments.some(c => c.user.login === 'github-actions[bot]' && c.body.includes('Auto-merged'))) return;

            // Check Copilot reviewed
            const { data: reviews } = await github.rest.pulls.listReviews({
              owner: context.repo.owner, repo: context.repo.repo,
              pull_number: prNumber
            });
            if (!reviews.some(r => r.user.login === 'copilot-pull-request-reviewer[bot]')) {
              console.log(`PR #${prNumber}: no Copilot review yet`);
              return;
            }

            // Check for inline suggestions
            const { data: reviewComments } = await github.rest.pulls.listReviewComments({
              owner: context.repo.owner, repo: context.repo.repo,
              pull_number: prNumber
            });
            // Only count comments on the latest commit -- old comments from
            // previous pushes should not permanently block auto-merge.
            const suggestions = reviewComments.filter(
              c => c.user.login === 'copilot-pull-request-reviewer[bot]'
                && c.commit_id === prData.head.sha
            );
            if (suggestions.length > 0) {
              if (!comments.some(c => c.user.login === 'github-actions[bot]' && c.body.includes('Auto-merge skipped'))) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: prNumber,
                  body: `## Auto-merge skipped\n\nCopilot found ${suggestions.length} suggestion(s).`
                });
              }
              return;
            }

            // Merge
            const labels = prData.labels.map(l => l.name);
            const complexity = labels.find(l => l.startsWith('complexity:')) || 'unknown';
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner, repo: context.repo.repo,
              pull_number: prNumber, per_page: 100
            });
            const changedLines = files.reduce((sum, f) => sum + f.additions + f.deletions, 0);
            const fileList = files.map(f => f.filename).join(', ');

            try {
              await github.rest.pulls.merge({
                owner: context.repo.owner, repo: context.repo.repo,
                pull_number: prNumber, merge_method: 'squash'
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: prNumber,
                body: `## Auto-merged\n\nCopilot reviewed (${complexity}), no suggestions.\n\n**${changedLines} lines** across: ${fileList}`
              });
              console.log(`PR #${prNumber} auto-merged`);
            } catch (err) {
              console.log(`PR #${prNumber} merge failed: ${err.message}`);
            }
