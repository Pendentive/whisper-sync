name: Nightly Release (dev to main)

on:
  schedule:
    # Run at 4:00 AM UTC daily (11:00 PM CT)
    - cron: '0 4 * * *'
  # Allow manual trigger
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if dev is ahead of main
        id: check
        run: |
          git fetch origin main dev
          AHEAD=$(git rev-list --count origin/main..origin/dev)
          echo "commits_ahead=$AHEAD" >> $GITHUB_OUTPUT
          echo "Dev is $AHEAD commits ahead of main"

      - name: Create release PR if needed
        if: steps.check.outputs.commits_ahead != '0'
        uses: actions/github-script@v7
        with:
          script: |
            // Check if a dev->main PR already exists
            const { data: existingPRs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:dev`,
              base: 'main',
              state: 'open',
            });

            if (existingPRs.length > 0) {
              console.log(`Release PR already open: #${existingPRs[0].number}`);
              return;
            }

            const ahead = parseInt('${{ steps.check.outputs.commits_ahead }}');
            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `release: nightly dev to main (${ahead} commits)`,
              head: 'dev',
              base: 'main',
              body: [
                '## Nightly Release',
                '',
                `Merging ${ahead} commit(s) from dev to main.`,
                '',
                'Auto-generated by nightly-release workflow.',
                'Copilot will review before auto-merge.',
              ].join('\n'),
            });

            console.log(`Created release PR #${pr.number}`);
