name: Auto-Merge on Copilot Approval

on:
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: >
      github.event.review.user.login == 'copilot-pull-request-reviewer[bot]'
      && github.event.review.state == 'APPROVED'
    steps:
      - name: Check complexity and merge
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const prNumber = pr.number;

            // Get labels
            const { data: prData } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });

            const labels = prData.labels.map(l => l.name);
            const isHigh = labels.includes('complexity:high');

            if (isHigh) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: '## Auto-merge skipped\n\nCopilot approved, but this is `complexity:high`. Human review required.\n\ncc @pendentive'
              });
              return;
            }

            // Check if Copilot had concerns (COMMENTED vs APPROVED)
            const { data: reviews } = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });

            const copilotReviews = reviews.filter(
              r => r.user.login === 'copilot-pull-request-reviewer[bot]'
            );

            const hasApproval = copilotReviews.some(r => r.state === 'APPROVED');

            if (!hasApproval) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: '## Auto-merge skipped\n\nCopilot reviewed but did not approve. Please address Copilot\'s suggestions before merging.'
              });
              return;
            }

            // Get file details for the decision log
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              per_page: 100
            });

            const changedLines = files.reduce((sum, f) => sum + f.additions + f.deletions, 0);
            const fileList = files.map(f => f.filename).join(', ');
            const complexity = labels.find(l => l.startsWith('complexity:')) || 'unknown';

            // Merge the PR
            try {
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                merge_method: 'squash'
              });

              // Post confirmation
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: [
                  '## Auto-merged',
                  '',
                  `Copilot approved (${complexity}). Merged automatically.`,
                  '',
                  `**${changedLines} lines** across: ${fileList}`
                ].join('\n')
              });

              console.log(`PR #${prNumber} auto-merged: ${complexity}, ${changedLines} lines, files: ${fileList}`);

            } catch (err) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: `## Auto-merge failed\n\n\`${err.message}\`\n\nPlease merge manually.`
              });
            }
