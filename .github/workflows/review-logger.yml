name: Review Logger

on:
  pull_request:
    types: [closed]

permissions:
  contents: write
  pull-requests: read

jobs:
  log-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.base.ref }}

      - name: Collect PR data and append log entry
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;

            // --- Reviews ---
            const { data: reviews } = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100
            });

            // Find Copilot review
            const copilotReview = reviews.find(
              r => r.user.login === 'copilot-pull-request-reviewer[bot]'
            );

            // --- Review comments (inline suggestions) ---
            const { data: reviewComments } = await github.rest.pulls.listReviewComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100
            });
            const copilotComments = reviewComments.filter(
              c => c.user.login === 'copilot-pull-request-reviewer[bot]'
            );

            // Build suggestion details
            const suggestionDetails = copilotComments.map(c => ({
              file: c.path,
              line: c.line || c.original_line,
              body: c.body.substring(0, 300)
            }));

            // --- Copilot object ---
            const copilot = copilotReview
              ? {
                  reviewed: true,
                  state: copilotReview.state,
                  suggestions: copilotComments.length,
                  suggestion_details: suggestionDetails,
                  body_summary: (copilotReview.body || '').substring(0, 200)
                }
              : {
                  reviewed: false,
                  state: null,
                  suggestions: 0,
                  suggestion_details: [],
                  body_summary: ''
                };

            // --- Files changed ---
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100
            });
            const filesChanged = files.map(f => f.filename);
            const linesAdded = files.reduce((sum, f) => sum + f.additions, 0);
            const linesRemoved = files.reduce((sum, f) => sum + f.deletions, 0);

            // --- Labels / complexity ---
            const labels = pr.labels.map(l => l.name);
            const complexityLabel = labels.find(l => l.startsWith('complexity:'));
            const complexity = complexityLabel
              ? complexityLabel.replace('complexity:', '')
              : 'unknown';

            // --- Auto-merge detection ---
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              per_page: 100
            });
            const autoMergeComment = comments.find(
              c => c.user.login === 'github-actions[bot]' && c.body.includes('Auto-merged')
            );
            const autoMergeSkipped = comments.find(
              c => c.user.login === 'github-actions[bot]' && c.body.includes('Auto-merge skipped')
            );

            const autoMergeAttempted = !!(autoMergeComment || autoMergeSkipped);
            let autoMergeResult = 'not-attempted';
            if (autoMergeComment) autoMergeResult = 'merged';
            else if (autoMergeSkipped) autoMergeResult = 'skipped';

            // --- Docs check warnings ---
            const docsWarnings = [];
            const docFiles = filesChanged.filter(f =>
              f.endsWith('.md') || f.endsWith('.txt') || f.endsWith('.rst')
            );
            if (docFiles.length === 0 && filesChanged.length > 3) {
              docsWarnings.push('No documentation files updated despite 4+ files changed');
            }

            // --- Duration ---
            const opened = new Date(pr.created_at);
            const closed = new Date(pr.closed_at);
            const durationMinutes = Math.round((closed - opened) / 60000);

            // --- Outcome ---
            let outcome;
            if (pr.merged) {
              outcome = autoMergeComment ? 'auto-merged' : 'manually-merged';
            } else {
              outcome = 'closed-without-merge';
            }

            // --- Build entry ---
            const entry = {
              pr: pr.number,
              title: pr.title,
              branch: pr.head.ref,
              target: pr.base.ref,
              author: pr.user.login,
              opened: pr.created_at,
              closed: pr.closed_at,
              merged: pr.merged,
              complexity,
              files_changed: filesChanged,
              lines_added: linesAdded,
              lines_removed: linesRemoved,
              triage: { labels },
              copilot,
              auto_merge: {
                attempted: autoMergeAttempted,
                result: autoMergeResult
              },
              docs_check: { warnings: docsWarnings },
              outcome,
              duration_minutes: durationMinutes
            };

            const line = JSON.stringify(entry);

            // --- Write to file ---
            const fs = require('fs');
            const path = require('path');
            const logPath = path.join(process.env.GITHUB_WORKSPACE, 'docs', 'review-log.jsonl');
            const logDir = path.dirname(logPath);

            if (!fs.existsSync(logDir)) {
              fs.mkdirSync(logDir, { recursive: true });
            }

            fs.appendFileSync(logPath, line + '\n');
            console.log(`Logged PR #${pr.number}: ${outcome} (${durationMinutes}min)`);

      - name: Commit and push
        run: |
          git config user.name "Pendentive"
          git config user.email "pendentive.info@gmail.com"
          git add docs/review-log.jsonl
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "docs: log PR #${{ github.event.pull_request.number }} review data"
            git push
          fi
